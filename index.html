<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EasyLayout</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">

    <header id="toolbar">
      <div class="toolbar-group">
        <button id="tool-select" class="tool-btn active" title="선택 (V)">
          <svg viewBox="0 0 16 16"><path d="M2 2l5 12 2-4 4-2z"/></svg>
        </button>
        <button id="tool-pan" class="tool-btn" title="패닝 (H)">
          <svg viewBox="0 0 16 16"><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.5 3.5l1.4 1.4M11.1 11.1l1.4 1.4M3.5 12.5l1.4-1.4M11.1 4.9l1.4-1.4" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/><circle cx="8" cy="8" r="2.5" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
        </button>
      </div>

      <div class="toolbar-divider"></div>

      <div class="toolbar-group">
        <button id="btn-undo" title="실행 취소 (Ctrl+Z)">
          <svg viewBox="0 0 16 16"><path d="M3 7a5 5 0 105 5" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/><path d="M3 3v4h4" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button id="btn-redo" title="다시 실행 (Ctrl+Y)">
          <svg viewBox="0 0 16 16"><path d="M13 7a5 5 0 115 5" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" transform="translate(-5,0)"/><path d="M13 3v4h-4" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>

      <div class="toolbar-divider"></div>

      <div class="toolbar-group">
        <button id="btn-delete" title="삭제 (Delete)">
          <svg viewBox="0 0 16 16"><path d="M4 5h8M6 5V3h4v2M5 5l.5 8h5l.5-8" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button id="btn-bring-front" title="앞으로 가져오기">
          <svg viewBox="0 0 16 16"><rect x="5" y="1" width="9" height="9" rx="1" stroke="currentColor" stroke-width="1.5" fill="white"/><rect x="2" y="6" width="9" height="9" rx="1" stroke="currentColor" stroke-width="1.5" fill="#e0e0e0"/></svg>
        </button>
        <button id="btn-send-back" title="뒤로 보내기">
          <svg viewBox="0 0 16 16"><rect x="2" y="6" width="9" height="9" rx="1" stroke="currentColor" stroke-width="1.5" fill="white"/><rect x="5" y="1" width="9" height="9" rx="1" stroke="currentColor" stroke-width="1.5" fill="#e0e0e0"/></svg>
        </button>
      </div>

      <div class="toolbar-divider"></div>

      <div class="toolbar-group">
        <button id="btn-grid" class="toggle-btn active" title="격자 표시">
          <svg viewBox="0 0 16 16"><path d="M1 5h14M1 11h14M5 1v14M11 1v14" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
        </button>
        <button id="btn-snap" class="toggle-btn active" title="격자 스냅">
          <svg viewBox="0 0 16 16"><circle cx="4" cy="4" r="1.5" fill="currentColor"/><circle cx="12" cy="4" r="1.5" fill="currentColor"/><circle cx="4" cy="12" r="1.5" fill="currentColor"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/><circle cx="8" cy="8" r="2" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
        </button>
      </div>

      <div class="toolbar-divider"></div>

      <div class="toolbar-group">
        <button id="btn-save">저장</button>
        <button id="btn-load">불러오기</button>
        <button id="btn-export-png">PNG 내보내기</button>
        <button id="btn-reset" title="초기화">초기화</button>
      </div>

      <input type="file" id="file-input" accept=".json" style="display:none">
    </header>

    <div id="main">

      <aside id="shape-panel">
        <div class="panel-title">도형</div>
        <div class="shape-list">
          <button class="shape-btn" data-shape="rect">
            <svg viewBox="0 0 40 30"><rect x="4" y="4" width="32" height="22" rx="2" fill="#c8d8f0" stroke="#5b8ce6" stroke-width="2"/></svg>
            <span>사각형</span>
          </button>
          <button class="shape-btn" data-shape="circle">
            <svg viewBox="0 0 40 30"><ellipse cx="20" cy="15" rx="16" ry="11" fill="#c8d8f0" stroke="#5b8ce6" stroke-width="2"/></svg>
            <span>타원</span>
          </button>
          <button class="shape-btn" data-shape="triangle">
            <svg viewBox="0 0 40 30"><polygon points="20,3 36,27 4,27" fill="#c8d8f0" stroke="#5b8ce6" stroke-width="2"/></svg>
            <span>삼각형</span>
          </button>
          <button class="shape-btn" data-shape="line">
            <svg viewBox="0 0 40 30"><line x1="4" y1="26" x2="36" y2="4" stroke="#5b8ce6" stroke-width="2.5" stroke-linecap="round"/></svg>
            <span>선</span>
          </button>
        </div>
      </aside>

      <div id="canvas-wrapper">
        <div id="canvas-container">
          <svg id="canvas" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <pattern id="grid-small" width="20" height="20" patternUnits="userSpaceOnUse">
                <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e0e0e0" stroke-width="0.5"/>
              </pattern>
              <pattern id="grid-large" width="100" height="100" patternUnits="userSpaceOnUse">
                <rect width="100" height="100" fill="url(#grid-small)"/>
                <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#c8c8c8" stroke-width="1"/>
              </pattern>
            </defs>
            <g id="shapes-layer">
              <rect id="grid-bg" x="-5000" y="-5000" width="10000" height="10000" fill="url(#grid-large)"/>
            </g>
            <g id="selection-layer"></g>
          </svg>
        </div>
        <div id="zoom-indicator">100%</div>
      </div>

      <aside id="props-panel">
        <div class="panel-title">속성</div>
        <div id="props-content">
          <p class="no-selection">도형을 선택하세요</p>
        </div>
      </aside>

    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
